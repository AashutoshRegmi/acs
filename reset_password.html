<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SecureAuth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2026-03-30">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand fw-bold" href="login.html">
                <i class="fas fa-chevron-left me-2"></i>Back to Login
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="glass-card">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">
                            <i class="fas fa-unlock-alt me-2"></i>Reset Password
                        </h2>

                        <p class="text-center text-muted mb-4">
                            Enter your new password below.
                        </p>

                        <div id="alertContainer"></div>

                        <form id="resetPasswordForm" action="reset_password.php" method="POST" novalidate>
                            <!-- Hidden token field -->
                            <input type="hidden" id="resetToken" name="token" value="">

                            <!-- New Password -->
                            <div class="mb-3">
                                <label for="newPassword" class="form-label">
                                    <i class="fas fa-unlock-alt me-2"></i>New Password *
                                </label>
                                <div class="password-wrap">
                                    <input type="password" class="form-control" id="newPassword" name="new_password" required>
                                    <button class="password-toggle" type="button" onclick="togglePassword('newPassword', this)">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div id="passwordStrength" class="mt-2"></div>
                                <div id="passwordRequirements" class="small text-muted mt-1"></div>
                            </div>

                            <!-- Confirm New Password -->
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">
                                    <i class="fas fa-check-circle me-2"></i>Confirm New Password *
                                </label>
                                <div class="password-wrap">
                                    <input type="password" class="form-control" id="confirmPassword" name="confirm_password" required>
                                    <button class="password-toggle" type="button" onclick="togglePassword('confirmPassword', this)">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div id="confirmMatch" class="small mt-1"></div>
                            </div>

                            <div class="mb-4">
                                <div class="cf-turnstile" id="turnstileWidget"></div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3" id="submitBtn">
                                <i class="fas fa-save me-2"></i>Reset Password
                            </button>
                        </form>

                        <div class="text-center">
                            <p class="text-muted mb-2">Remember your password?</p>
                            <a href="login.html" class="btn btn-outline-secondary">
                                <i class="fas fa-sign-in-alt me-2"></i>Back to Login
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Password Policy Info -->
                <div class="glass-card mt-4">
                    <div class="card-header">
                        <h6 class="mb-0"><i class="fas fa-shield-alt me-2"></i>Password Requirements</h6>
                    </div>
                    <div class="card-body">
                        <ul class="list-unstyled small mb-0">
                            <li id="req-length"><i class="fas fa-times text-danger me-2"></i>8-12 characters</li>
                            <li id="req-uppercase"><i class="fas fa-times text-danger me-2"></i>At least 1 uppercase letter</li>
                            <li id="req-lowercase"><i class="fas fa-times text-danger me-2"></i>At least 1 lowercase letter</li>
                            <li id="req-number"><i class="fas fa-times text-danger me-2"></i>At least 1 number</li>
                            <li id="req-special"><i class="fas fa-times text-danger me-2"></i>At least 1 special character</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="csrf_client.js"></script>
    <script>
        // Get token from URL parameters
        document.addEventListener('DOMContentLoaded', function() {
            if (window.ensureCsrfToken) {
                window.ensureCsrfToken().catch(() => {});
            }

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                document.getElementById('alertContainer').innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>Invalid or missing reset token. Please request a new password reset.
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                document.getElementById('resetPasswordForm').style.display = 'none';
                return;
            }

            document.getElementById('resetToken').value = token;
        });

        // Password toggle functionality
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // Real-time password validation
        document.getElementById('newPassword').addEventListener('input', function() {
            validatePassword(this.value);
            checkPasswordMatch();
        });

        document.getElementById('confirmPassword').addEventListener('input', checkPasswordMatch);

        function validatePassword(password) {
            const requirements = {
                length: password.length >= 8 && password.length <= 12,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /\d/.test(password),
                special: /[!@#$%^&*()_+\-=\[\]{};\':"\\|,.<>\/?]/.test(password)
            };

            // Update requirement indicators
            document.getElementById('req-length').innerHTML =
                `<i class="fas fa-${requirements.length ? 'check text-success' : 'times text-danger'} me-2"></i>8-12 characters`;
            document.getElementById('req-uppercase').innerHTML =
                `<i class="fas fa-${requirements.uppercase ? 'check text-success' : 'times text-danger'} me-2"></i>At least 1 uppercase letter`;
            document.getElementById('req-lowercase').innerHTML =
                `<i class="fas fa-${requirements.lowercase ? 'check text-success' : 'times text-danger'} me-2"></i>At least 1 lowercase letter`;
            document.getElementById('req-number').innerHTML =
                `<i class="fas fa-${requirements.number ? 'check text-success' : 'times text-danger'} me-2"></i>At least 1 number`;
            document.getElementById('req-special').innerHTML =
                `<i class="fas fa-${requirements.special ? 'check text-success' : 'times text-danger'} me-2"></i>At least 1 special character`;

            // Calculate strength
            const metRequirements = Object.values(requirements).filter(Boolean).length;
            let strength = '';
            let strengthClass = '';

            if (metRequirements < 3) {
                strength = 'Weak';
                strengthClass = 'text-danger';
            } else if (metRequirements < 5) {
                strength = 'Medium';
                strengthClass = 'text-warning';
            } else {
                strength = 'Strong';
                strengthClass = 'text-success';
            }

            document.getElementById('passwordStrength').innerHTML =
                `<small class="${strengthClass}">Password Strength: ${strength}</small>`;
        }

        function checkPasswordMatch() {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const matchIndicator = document.getElementById('confirmMatch');

            if (confirmPass === '') {
                matchIndicator.innerHTML = '';
                return;
            }

            if (newPass === confirmPass) {
                matchIndicator.innerHTML = '<small class="text-success"><i class="fas fa-check me-1"></i>Passwords match</small>';
            } else {
                matchIndicator.innerHTML = '<small class="text-danger"><i class="fas fa-times me-1"></i>Passwords do not match</small>';
            }
        }

        // Form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Resetting Password...';

            const formData = new FormData(this);

            if (!formData.get('cf-turnstile-response')) {
                const alertContainer = document.getElementById('alertContainer');
                alertContainer.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>Please complete the CAPTCHA verification before submitting.
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
                return;
            }

            fetch('reset_password.php', {
                method: 'POST',
                headers: window.withCsrfHeaders ? window.withCsrfHeaders() : {},
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                const alertContainer = document.getElementById('alertContainer');
                alertContainer.innerHTML = '';

                if (data.success) {
                    alertContainer.innerHTML = `
                        <div class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="fas fa-check-circle me-2"></i>${data.message}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    `;
                    // Redirect after success
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    alertContainer.innerHTML = `
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-triangle me-2"></i>${data.message}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    `;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                const alertContainer = document.getElementById('alertContainer');
                alertContainer.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>An error occurred. Please try again.
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            });
        });

        document.addEventListener('DOMContentLoaded', function () {
            function renderWidgetWithRetry(siteKey, remainingAttempts) {
                const widget = document.getElementById('turnstileWidget');
                if (!widget) {
                    return;
                }

                if (window.turnstile && typeof window.turnstile.render === 'function') {
                    widget.innerHTML = '';
                    window.turnstile.render(widget, {
                        sitekey: siteKey
                    });
                    return;
                }

                if (remainingAttempts <= 0) {
                    return;
                }

                setTimeout(function () {
                    renderWidgetWithRetry(siteKey, remainingAttempts - 1);
                }, 150);
            }

            fetch('public_config.php')
                .then(response => response.json())
                .then(config => {
                    if (!config.turnstileSiteKey) {
                        return;
                    }

                    renderWidgetWithRetry(config.turnstileSiteKey, 40);
                })
                .catch(() => {});
        });
    </script>
</body>
</html>
