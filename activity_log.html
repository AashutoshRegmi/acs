<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Log - SecureAuth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2026-03-30">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <i class="fas fa-chevron-left me-2"></i>Back to Dashboard
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="glass-card">
                    <div class="card-body p-5">
                        <div class="d-flex align-items-center mb-4">
                            <i class="fas fa-clipboard-list fa-2x text-white me-3"></i>
                            <div>
                                <h2 class="text-white mb-0">Activity Log</h2>
                                <p class="text-white-50 mb-0">Monitor your account activity and security events</p>
                            </div>
                        </div>

                        <div id="loading" class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-3 text-muted">Loading activity log...</p>
                        </div>

                        <div id="activity-container" class="d-none">
                            <div id="activity-list"></div>
                        </div>

                        <div id="error-message" class="alert alert-danger d-none" role="alert">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            <span id="error-text"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadActivityLog();
        });

        function loadActivityLog() {
            fetch('activity_log.php', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading').classList.add('d-none');

                if (data.success) {
                    displayActivityLog(data.logs);
                } else {
                    showError(data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('loading').classList.add('d-none');
                showError('Failed to load activity log. Please try again.');
            });
        }

        function displayActivityLog(logs) {
            const container = document.getElementById('activity-container');
            const list = document.getElementById('activity-list');

            if (logs.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                        <h4 class="text-muted">No Activity Yet</h4>
                        <p class="text-muted">Your account activity will appear here.</p>
                    </div>
                `;
            } else {
                list.innerHTML = logs.map(log => {
                    const iconClass = getActivityIcon(log.action);
                    return `
                        <div class="activity-item">
                            <div class="d-flex align-items-start">
                                <div class="activity-icon ${iconClass}">
                                    <i class="${getActivityIconClass(log.action)}"></i>
                                </div>
                                <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-start">
                                        <div>
                                            <h6 class="text-white mb-1">${log.action}</h6>
                                            ${log.details ? `<p class="text-white-75 mb-1">${log.details}</p>` : ''}
                                            <small class="text-white-50">
                                                <i class="fas fa-globe me-1"></i>${log.ip_address}
                                            </small>
                                        </div>
                                        <small class="timestamp">${log.timestamp}</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            container.classList.remove('d-none');
        }

        function getActivityIcon(action) {
            if (action.includes('Login')) return 'login-icon';
            if (action.includes('Password')) return 'password-icon';
            if (action.includes('Email')) return 'email-icon';
            if (action.includes('2FA')) return 'security-icon';
            return 'default-icon';
        }

        function getActivityIconClass(action) {
            if (action.includes('Login')) return 'fas fa-sign-in-alt';
            if (action.includes('Password')) return 'fas fa-key';
            if (action.includes('Email')) return 'fas fa-envelope';
            if (action.includes('2FA')) return 'fas fa-shield-alt';
            return 'fas fa-info-circle';
        }

        function showError(message) {
            document.getElementById('error-text').textContent = message;
            document.getElementById('error-message').classList.remove('d-none');
        }
    </script>
</body>
</html>
