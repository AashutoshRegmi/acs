<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - SecureAuth</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=2026-03-30" />
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-transparent position-absolute top-0 start-0 w-100" style="z-index: 20;">
    <div class="container auth-container">
      <a class="navbar-brand fw-bold" href="index.html">
        <span class="gold-gradient-text">Secure</span>Auth
      </a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="login.html">Sign In</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <div class="container auth-container">
      <div class="register-card">
        <div class="glass-gold fade-in-up">
          <div class="text-center mb-4">
            <div class="security-icon"><i class="fas fa-user-tie"></i></div>
            <h1 class="auth-title gold-gradient-text gold-text-shadow">Create your account</h1>
            <p class="auth-subtitle">Join with secure onboarding and verification.</p>
          </div>

          <form id="registrationForm" action="register.php" method="POST" novalidate>
            <div class="row g-4">
              <div class="col-lg-6">
                <div class="form-section-title">Account Information</div>

                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="firstName" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="firstName" name="firstName" placeholder="Enter first name" required />
                  </div>

                  <div class="col-md-6">
                    <label for="lastName" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Enter last name" required />
                  </div>

                  <div class="col-12">
                    <label for="middleName" class="form-label">Middle Name <span class="text-muted">(Optional)</span></label>
                    <input type="text" class="form-control" id="middleName" name="middleName" placeholder="Enter middle name" />
                  </div>

                  <div class="col-12">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required />
                  </div>

                  <div class="col-12">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email address" required />
                  </div>
                </div>
              </div>

              <div class="col-lg-6">
                <div class="form-section-title">Contact & Security</div>

                <div class="row g-3">
                  <div class="col-md-5">
                    <label for="countryCode" class="form-label">Country</label>
                    <select class="form-select" id="countryCode" name="countryCode" required>
                      <option value="">Select Country</option>
                    </select>
                  </div>

                  <div class="col-md-7">
                    <label for="phoneNumber" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber" placeholder="Enter phone number" required />
                  </div>

                  <div class="col-12">
                    <label for="password" class="form-label">Password</label>
                    <div class="password-wrap">
                      <input type="password" class="form-control" id="password" name="password" placeholder="Create a strong password" required />
                      <button class="password-toggle" type="button" onclick="togglePassword('password', this)" aria-label="Toggle password visibility">
                        <i class="fas fa-eye"></i>
                      </button>
                    </div>
                    <div id="passwordStrength"></div>
                  </div>

                  <div class="col-12">
                    <label for="generatedPassword" class="form-label">Generated Password</label>
                    <div class="password-wrap">
                      <input type="text" class="form-control" id="generatedPassword" readonly placeholder="Generate a password below" />
                    </div>
                    <div class="d-flex gap-2 mt-2">
                      <button type="button" class="btn btn-outline-primary btn-sm" id="generatePasswordBtn">Generate Password</button>
                      <button type="button" class="btn btn-primary btn-sm" id="useGeneratedPasswordBtn">Use Generated</button>
                    </div>
                  </div>

                  <div class="col-12">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <div class="password-wrap">
                      <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required />
                      <button class="password-toggle" type="button" onclick="togglePassword('confirmPassword', this)" aria-label="Toggle password visibility">
                        <i class="fas fa-eye"></i>
                      </button>
                    </div>
                  </div>

                  <div class="col-12">
                    <div class="muted-panel">
                      <strong class="d-block mb-2">Password requirements</strong>
                      <small class="text-white">
                        Use at least 8 characters with uppercase, lowercase, number, and special character.
                      </small>
                    </div>
                  </div>
                </div>
              </div>

              <div class="col-12">
                <div class="form-section-title">Verification</div>
                <div class="cf-turnstile" id="turnstileWidget"></div>
              </div>

              <div class="col-12">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="terms" required />
                  <label class="form-check-label" for="terms">
                    I agree to the <a href="#" class="small-link">Terms of Service</a> and
                    <a href="#" class="small-link">Privacy Policy</a>
                  </label>
                </div>
              </div>

              <div class="col-12">
                <div class="d-grid d-md-flex gap-3">
                  <button type="submit" class="btn btn-primary btn-lg px-4 py-3 flex-grow-1">Create Account</button>
                  <a href="login.html" class="btn btn-outline-primary btn-lg px-4 py-3 flex-grow-1">Sign In Instead</a>
                  <a href="index.html" class="btn btn-soft btn-lg px-4 py-3 flex-grow-1">Back to Home</a>
                </div>
              </div>
            </div>
          </form>

          <div id="message"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="csrf_client.js"></script>
  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const messageEl = document.getElementById('message');

      function showTurnstileError(text) {
        if (!messageEl) {
          return;
        }

        messageEl.textContent = text;
        messageEl.className = 'error';
      }

      function renderWidgetWithRetry(siteKey, remainingAttempts) {
        const widget = document.getElementById('turnstileWidget');
        if (!widget) {
          return;
        }

        if (window.turnstile && typeof window.turnstile.render === 'function') {
          widget.innerHTML = '';
          window.turnstile.render(widget, {
            sitekey: siteKey
          });
          return;
        }

        if (remainingAttempts <= 0) {
          showTurnstileError('Security verification failed to load. Please refresh the page and try again.');
          return;
        }

        setTimeout(function () {
          renderWidgetWithRetry(siteKey, remainingAttempts - 1);
        }, 150);
      }

      fetch('public_config.php')
        .then(response => response.json())
        .then(config => {
          if (!config.turnstileSiteKey) {
            showTurnstileError('Turnstile site key is missing. Please configure TURNSTILE_SITE_KEY in .env.');
            return;
          }

          renderWidgetWithRetry(config.turnstileSiteKey, 40);
        })
        .catch(() => {
          showTurnstileError('Unable to load security settings. Please refresh and try again.');
        });
    });
  </script>
  <script>
    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        button.innerHTML = '<i class="fas fa-eye-slash"></i>';
      } else {
        input.type = 'password';
        button.innerHTML = '<i class="fas fa-eye"></i>';
      }
    }
  </script>
</body>
</html>
